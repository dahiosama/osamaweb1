<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Contact - Developer Portfolio</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&amp;family=Space+Grotesk:wght@300..700&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              navy: '#080c18',
              electric: '#2563ff',
              glass: 'rgba(255, 255, 255, 0.03)',
              'glass-border': 'rgba(255, 255, 255, 0.1)',
            }
          },
          fontFamily: {
            heading: ['"Space Grotesk"', 'sans-serif'],
            body: ['"DM Sans"', 'sans-serif'],
          },
          boxShadow: {
            'glow': '0 0 20px rgba(37, 99, 255, 0.5)',
            'glow-hover': '0 0 30px rgba(37, 99, 255, 0.8)',
          }
        }
      }
    }
  </script>
<style data-purpose="custom-animations">
    @keyframes glow-pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }
    .animate-glow-pulse {
      animation: glow-pulse 4s ease-in-out infinite;
    }
    .glass-effect {
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
  </style>
</head>
<body class="bg-brand-navy font-body text-gray-300">
<!-- BEGIN: ContactSection -->
<section class="relative min-h-screen flex flex-col items-center justify-center px-6 py-20 overflow-hidden" id="contact">
<!-- BEGIN: GlowingDivider -->
<!-- Subtle glowing line at the top to separate from previous section -->
<div class="absolute top-0 left-1/2 -translate-x-1/2 w-full max-w-5xl h-[1px] bg-gradient-to-r from-transparent via-brand-electric to-transparent opacity-50 shadow-[0_0_15px_rgba(37,99,255,0.6)] animate-glow-pulse"></div>
<!-- END: GlowingDivider -->
<!-- Background Decoration -->
<div class="absolute top-1/4 -left-20 w-72 h-72 bg-brand-electric/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-1/4 -right-20 w-72 h-72 bg-brand-electric/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="container mx-auto max-w-6xl relative z-10">
<!-- BEGIN: HeaderGroup -->
<div class="text-center mb-16" data-purpose="section-header">
<h2 class="font-heading text-4xl md:text-6xl font-bold text-white mb-4">
          Get in <span class="text-brand-electric">Touch</span>
</h2>
<p class="text-lg md:text-xl text-gray-400 max-w-2xl mx-auto">
          Have a project in mind? Let's build something amazing together.
        </p>
</div>
<!-- END: HeaderGroup -->
<div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-start">
<!-- BEGIN: ContactInfo -->
<div class="space-y-10" data-purpose="contact-details">
<div class="space-y-8">
<!-- Email Item -->
<div class="flex items-start gap-5 group">
<div class="flex-shrink-0 w-12 h-12 rounded-xl bg-brand-glass border border-brand-glass-border flex items-center justify-center group-hover:border-brand-electric transition-colors duration-300">
<svg class="w-6 h-6 text-brand-electric" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
</svg>
</div>
<div>
<h4 class="font-heading text-xl text-white font-medium mb-1">Email</h4>
<a class="hover:text-brand-electric transition-colors" href="mailto:hello@developer.io">hello@developer.io</a>
</div>
</div>
<!-- Location Item -->
<div class="flex items-start gap-5 group">
<div class="flex-shrink-0 w-12 h-12 rounded-xl bg-brand-glass border border-brand-glass-border flex items-center justify-center group-hover:border-brand-electric transition-colors duration-300">
<svg class="w-6 h-6 text-brand-electric" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
<path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
</svg>
</div>
<div>
<h4 class="font-heading text-xl text-white font-medium mb-1">Location</h4>
<p>San Francisco, CA (Available for Remote)</p>
</div>
</div>
<!-- Socials Item -->
<div class="flex items-start gap-5 group">
<div class="flex-shrink-0 w-12 h-12 rounded-xl bg-brand-glass border border-brand-glass-border flex items-center justify-center group-hover:border-brand-electric transition-colors duration-300">
<svg class="w-6 h-6 text-brand-electric" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
</svg>
</div>
<div>
<h4 class="font-heading text-xl text-white font-medium mb-3">Follow Me</h4>
<div class="flex gap-4">
<!-- GitHub -->
<a aria-label="GitHub" class="p-2 bg-brand-glass border border-brand-glass-border rounded-lg hover:border-brand-electric hover:text-brand-electric transition-all" href="#">
<svg class="w-5 h-5 fill-current" viewbox="0 0 24 24"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.43.372.823 1.102.823 2.222 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"></path></svg>
</a>
<!-- LinkedIn -->
<a aria-label="LinkedIn" class="p-2 bg-brand-glass border border-brand-glass-border rounded-lg hover:border-brand-electric hover:text-brand-electric transition-all" href="#">
<svg class="w-5 h-5 fill-current" viewbox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"></path></svg>
</a>
<!-- Twitter/X -->
<a aria-label="Twitter" class="p-2 bg-brand-glass border border-brand-glass-border rounded-lg hover:border-brand-electric hover:text-brand-electric transition-all" href="#">
<svg class="w-5 h-5 fill-current" viewbox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path></svg>
</a>
</div>
</div>
</div>
</div>
</div>
<!-- END: ContactInfo -->
<!-- BEGIN: ContactForm -->
<div class="glass-effect bg-brand-glass border border-brand-glass-border p-8 md:p-10 rounded-3xl" data-purpose="contact-form-container">
<form action="#" class="space-y-6" method="POST">
<!-- Name Field -->
<div class="space-y-2">
<label class="block text-sm font-medium text-gray-400" for="name">Full Name</label>
<input class="w-full px-5 py-4 bg-brand-glass border border-brand-glass-border rounded-xl text-white placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-brand-electric/50 focus:border-brand-electric transition-all glass-effect" id="name" name="name" placeholder="John Doe" required="" type="text"/>
</div>
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-sm font-medium text-gray-400" for="email">Email Address</label>
<input class="w-full px-5 py-4 bg-brand-glass border border-brand-glass-border rounded-xl text-white placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-brand-electric/50 focus:border-brand-electric transition-all glass-effect" id="email" name="email" placeholder="john@example.com" required="" type="email"/>
</div>
<!-- Message Field -->
<div class="space-y-2">
<label class="block text-sm font-medium text-gray-400" for="message">Your Message</label>
<textarea class="w-full px-5 py-4 bg-brand-glass border border-brand-glass-border rounded-xl text-white placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-brand-electric/50 focus:border-brand-electric transition-all glass-effect resize-none" id="message" name="message" placeholder="Tell me about your project..." required="" rows="5"></textarea>
</div>
<!-- Submit Button -->
<button class="w-full py-4 px-6 bg-brand-electric text-white font-heading font-bold rounded-xl shadow-glow hover:shadow-glow-hover hover:-translate-y-1 transition-all duration-300 flex items-center justify-center gap-2 group" type="submit">
              Send Message
              <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M14 5l7 7m0 0l-7 7m7-7H3" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</form>
</div>
<!-- END: ContactForm -->
</div>
</div>
</section>
<!-- END: ContactSection -->
</body></html>
